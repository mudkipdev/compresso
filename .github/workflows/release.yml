name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Add execute permissions for gradlew
        run: chmod +x gradlew

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all versions
        run: ./gradlew buildAllVersions -Pmod.version=${{ steps.version.outputs.version }}

      - name: Attach jars to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" versions/*/build/libs/*.jar --clobber

      - name: Publish to Modrinth
        run: ./gradlew publishAllVersions -Pmod.version=${{ steps.version.outputs.version }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ github.event.release.body }}
          RELEASE_TYPE: ${{ github.event.release.prerelease && 'BETA' || 'STABLE' }}
